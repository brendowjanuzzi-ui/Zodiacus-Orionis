<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiacus - Constelações Definidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010105;
            font-family: 'Cinzel', serif; color: white;
        }
        canvas { display: block; }
        
        #ui-info {
            position: absolute; top: 30px; left: 30px;
            pointer-events: none; opacity: 0.6; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="ui-info">MAPA ESTELAR ATIVO // SISTEMA SOLAR</div>
    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, stars = [], planets = [], mouse = { x: null, y: null, r: 150 };

        // Definição das formas dos Signos (IDs das estrelas que formam o contorno)
        const zodiacShapes = [
            { name: 'ÁRIES', color: '#FF5733', stars: [{x:0.1, y:0.2}, {x:0.15, y:0.18}, {x:0.18, y:0.25}, {x:0.12, y:0.28}] },
            { name: 'TOURO', color: '#FFC300', stars: [{x:0.8, y:0.2}, {x:0.85, y:0.15}, {x:0.9, y:0.2}, {x:0.85, y:0.3}, {x:0.8, y:0.25}] },
            { name: 'LEÃO', color: '#FF8D33', stars: [{x:0.1, y:0.7}, {x:0.2, y:0.65}, {x:0.25, y:0.75}, {x:0.15, y:0.85}, {x:0.05, y:0.8}] },
            { name: 'ESCORPIÃO', color: '#C70039', stars: [{x:0.8, y:0.8}, {x:0.85, y:0.7}, {x:0.9, y:0.8}, {x:0.85, y:0.9}, {x:0.75, y:0.85}] }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Criar estrelas baseadas nas formas
            stars = [];
            zodiacShapes.forEach(shape => {
                shape.stars.forEach((pos, index) => {
                    stars.push({
                        id: `${shape.name}_${index}`,
                        parent: shape.name,
                        color: shape.color,
                        px: pos.x * width,
                        py: pos.y * height,
                        baseX: pos.x,
                        baseY: pos.y,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3
                    });
                });
            });

            planets = [
                { dist: 120, spd: 0.005, size: 5, col: '#4df3ff', angle: 0 },
                { dist: 200, spd: 0.003, size: 8, col: '#ff4d4d', angle: 2 },
                { dist: 280, spd: 0.002, size: 12, col: '#dfbdff', angle: 4 }
            ];
        }

        function draw() {
            ctx.fillStyle = 'rgba(1, 1, 8, 0.2)';
            ctx.fillRect(0, 0, width, height);

            const cx = width / 2;
            const cy = height / 2;

            // 1. Desenhar Formas dos Signos (O "Corpo" das constelações)
            zodiacShapes.forEach(shape => {
                const shapeStars = stars.filter(s => s.parent === shape.name);
                let isHover = false;

                // Verifica interação
                shapeStars.forEach(s => {
                    if (mouse.x && Math.hypot(s.px - mouse.x, s.py - mouse.y) < mouse.r) isHover = true;
                });

                if (shapeStars.length > 0) {
                    ctx.beginPath();
                    ctx.moveTo(shapeStars[0].px, shapeStars[0].py);
                    for (let i = 1; i < shapeStars.length; i++) {
                        ctx.lineTo(shapeStars[i].px, shapeStars[i].py);
                    }
                    ctx.closePath();

                    // Se o mouse estiver perto, preenche a forma com uma cor suave
                    if (isHover) {
                        ctx.fillStyle = shape.color + '22'; // 22 é a transparência em Hex
                        ctx.fill();
                        ctx.strokeStyle = shape.color;
                        ctx.lineWidth = 2;
                        
                        // Nome do Signo flutuando
                        ctx.fillStyle = "#white";
                        ctx.font = "18px Cinzel";
                        ctx.fillText(shape.name, shapeStars[0].px, shapeStars[0].py - 20);
                    } else {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                        ctx.lineWidth = 0.5;
                    }
                    ctx.stroke();
                }
            });

            // 2. Atualizar Estrelas (Movimento e Drift)
            stars.forEach(s => {
                s.px += s.vx; s.py += s.vy;
                if (s.px < 0 || s.px > width) s.vx *= -1;
                if (s.py < 0 || s.py > height) s.vy *= -1;

                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(s.px, s.py, 2, 0, Math.PI*2); ctx.fill();
            });

            // 3. Sistema Solar (Sol e Planetas)
            ctx.shadowBlur = 20; ctx.shadowColor = 'orange';
            ctx.fillStyle = 'orange';
            ctx.beginPath(); ctx.arc(cx, cy, 25, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            planets.forEach(p => {
                p.angle += p.spd;
                const x = cx + Math.cos(p.angle) * p.dist;
                const y = cy + Math.sin(p.angle) * p.dist * 0.6; // Órbita elíptica/inclinada

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.beginPath(); ctx.ellipse(cx, cy, p.dist, p.dist * 0.6, 0, 0, Math.PI*2); ctx.stroke();

                ctx.fillStyle = p.col;
                ctx.beginPath(); ctx.arc(x, y, p.size, 0, Math.PI*2); ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        resize(); draw();
    </script>
</body>
</html>
