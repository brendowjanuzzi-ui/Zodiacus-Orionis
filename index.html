<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiacus - Galáxia Planetária</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010103;
            font-family: 'Cinzel', serif; color: white;
        }
        canvas { display: block; }

        #ui-overlay {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); text-align: center;
            pointer-events: none; transition: all 0.6s ease;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px); padding: 20px 60px;
            border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        #ui-overlay.active { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        #ui-overlay h1 { margin: 0; font-size: 28px; letter-spacing: 5px; color: #fffbdf; }
        #ui-overlay p { margin: 5px 0 0; font-size: 13px; opacity: 0.6; letter-spacing: 2px; }
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <div id="ui-overlay">
        <h1 id="sign-title">Signo</h1>
        <p id="sign-date">Exploração Espacial</p>
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui-overlay');
        const signTitle = document.getElementById('sign-title');
        const signDate = document.getElementById('sign-date');

        let width, height, stars = [], planets = [], mouse = { x: null, y: null, r: 100 };

        // Configuração dos Planetas (Raio da órbita, Velocidade, Tamanho, Cor)
        const planetSettings = [
            { distance: 80, speed: 0.015, size: 4, color: '#A5A5A5' }, // Mercúrio
            { distance: 130, speed: 0.010, size: 7, color: '#E3BB76' }, // Vênus
            { distance: 190, speed: 0.008, size: 8, color: '#2271B3' }, // Terra
            { distance: 250, speed: 0.006, size: 6, color: '#E27B58' }, // Marte
            { distance: 340, speed: 0.004, size: 14, color: '#D39C7E' } // Júpiter
        ];

        // Mapeamento das Constelações (simplificado para performance)
        const starsData = [
            { id: 'ar1', x: 0.1, y: 0.2 }, { id: 'ar2', x: 0.15, y: 0.15 }, { id: 'ta1', x: 0.8, y: 0.2 }, { id: 'ta2', x: 0.85, y: 0.25 },
            { id: 'ge1', x: 0.1, y: 0.8 }, { id: 'ge2', x: 0.15, y: 0.85 }, { id: 'le1', x: 0.8, y: 0.8 }, { id: 'le2', x: 0.85, y: 0.75 },
            { id: 'sc1', x: 0.5, y: 0.1 }, { id: 'sc2', x: 0.55, y: 0.15 }, { id: 'aq1', x: 0.5, y: 0.9 }, { id: 'aq2', x: 0.45, y: 0.85 }
        ];

        const constellations = [
            { name: 'Áries', date: 'Março - Abril', links: [['ar1', 'ar2']] },
            { name: 'Touro', date: 'Abril - Maio', links: [['ta1', 'ta2']] },
            { name: 'Gêmeos', date: 'Maio - Junho', links: [['ge1', 'ge2']] },
            { name: 'Leão', date: 'Julho - Agosto', links: [['le1', 'le2']] },
            { name: 'Escorpião', date: 'Outubro - Novembro', links: [['sc1', 'sc2']] },
            { name: 'Aquário', date: 'Janeiro - Fevereiro', links: [['aq1', 'aq2']] }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Inicializar Estrelas (Constelações)
            stars = starsData.map(s => ({
                ...s, px: s.x * width, py: s.y * height,
                vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
                o: Math.random(), spd: 0.01
            }));

            // Inicializar Planetas
            planets = planetSettings.map(p => ({ ...p, angle: Math.random() * Math.PI * 2 }));
        }

        function draw() {
            // Rastro sutil para dar movimento
            ctx.fillStyle = 'rgba(1, 1, 3, 0.15)';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            let activeSign = null;

            // 1. O Sol (Centro)
            const sunGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 30);
            sunGradient.addColorStop(0, '#FFF5CC');
            sunGradient.addColorStop(1, 'rgba(255, 180, 0, 0)');
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fill();

            // 2. Desenhar Constelações (Fundo)
            constellations.forEach(c => {
                let hover = false;
                c.links.forEach(l => {
                    const s1 = stars.find(st => st.id === l[0]), s2 = stars.find(st => st.id === l[1]);
                    if (mouse.x && (Math.hypot(s1.px-mouse.x, s1.py-mouse.y) < mouse.r)) hover = true;
                });

                ctx.beginPath();
                ctx.strokeStyle = hover ? '#fffbdf' : 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = hover ? 2 : 0.5;
                if(hover) activeSign = c;
                
                c.links.forEach(l => {
                    const s1 = stars.find(st => st.id === l[0]), s2 = stars.find(st => st.id === l[1]);
                    ctx.moveTo(s1.px, s1.py); ctx.lineTo(s2.px, s2.py);
                });
                ctx.stroke();
            });

            // 3. Atualizar Estrelas
            stars.forEach(s => {
                s.px += s.vx; s.py += s.vy;
                if (s.px < 0 || s.px > width) s.vx *= -1;
                if (s.py < 0 || s.py > height) s.vy *= -1;
                s.o += s.spd; if(s.o > 1 || s.o < 0.3) s.spd *= -1;
                ctx.fillStyle = `rgba(255, 251, 223, ${s.o})`;
                ctx.beginPath(); ctx.arc(s.px, s.py, 1.5, 0, Math.PI*2); ctx.fill();
            });

            // 4. Desenhar Planetas e Órbitas
            planets.forEach(p => {
                p.angle += p.speed;
                const x = centerX + Math.cos(p.angle) * p.distance;
                const y = centerY + Math.sin(p.angle) * p.distance;

                // Desenha Órbita sutil
                ctx.beginPath();
                ctx.arc(centerX, centerY, p.distance, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.stroke();

                // Desenha Planeta
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // UI
            if(activeSign) {
                signTitle.innerText = activeSign.name; signDate.innerText = activeSign.date;
                ui.classList.add('active');
            } else { ui.classList.remove('active'); }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        resize(); draw();
    </script>
</body>
</html>
