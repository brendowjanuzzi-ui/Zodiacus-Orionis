<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiacus - Galáxia à Deriva</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010103; /* Espaço ainda mais profundo */
            font-family: 'Cinzel', serif; color: white;
            user-select: none; /* Impede seleção de texto acidental */
        }
        canvas { display: block; }

        #ui-overlay {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); text-align: center;
            pointer-events: none; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px); padding: 25px 70px;
            border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        #ui-overlay.active { opacity: 1; transform: translateX(-50%) translateY(-15px); }
        #ui-overlay h1 { 
            margin: 0; font-size: 36px; letter-spacing: 6px; 
            color: #fffbdf; text-shadow: 0 0 25px rgba(255, 251, 223, 0.6);
            text-transform: uppercase;
        }
        #ui-overlay p { margin: 8px 0 0; font-size: 15px; opacity: 0.7; letter-spacing: 3px; font-style: italic; }
        
        #hint {
            position: absolute; top: 20px; width: 100%;
            text-align: center; opacity: 0.3; letter-spacing: 4px; font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="hint">A Galáxia está à deriva. Mova o mouse.</div>
    <canvas id="starCanvas"></canvas>

    <div id="ui-overlay">
        <h1 id="sign-title">Signo</h1>
        <p id="sign-date">Data do Zodíaco</p>
    </div>

    <script>
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui-overlay');
        const signTitle = document.getElementById('sign-title');
        const signDate = document.getElementById('sign-date');

        let width, height, stars = [], mouse = { x: null, y: null, r: 120 };

        // --- DADOS DAS ESTRELAS (Mapeamento de todos os 12 Signos) ---
        // Adicionando um fator de velocidade aleatória para cada estrela
        const starsData = [
            // Áries
            { id: 'ar1', x: 0.15, y: 0.20 }, { id: 'ar2', x: 0.18, y: 0.25 }, { id: 'ar3', x: 0.14, y: 0.30 },
            // Touro
            { id: 'ta1', x: 0.35, y: 0.15 }, { id: 'ta2', x: 0.38, y: 0.22 }, { id: 'ta3', x: 0.42, y: 0.25 }, { id: 'ta4', x: 0.32, y: 0.28 },
            // Gêmeos
            { id: 'ge1', x: 0.55, y: 0.12 }, { id: 'ge2', x: 0.58, y: 0.14 }, { id: 'ge3', x: 0.54, y: 0.25 }, { id: 'ge4', x: 0.59, y: 0.27 },
            // Câncer
            { id: 'ca1', x: 0.80, y: 0.15 }, { id: 'ca2', x: 0.78, y: 0.22 }, { id: 'ca3', x: 0.82, y: 0.28 }, { id: 'ca4', x: 0.85, y: 0.20 },
            // Leão
            { id: 'le1', x: 0.12, y: 0.50 }, { id: 'le2', x: 0.18, y: 0.48 }, { id: 'le3', x: 0.22, y: 0.55 }, { id: 'le4', x: 0.15, y: 0.60 }, { id: 'le5', x: 0.08, y: 0.58 },
            // Virgem
            { id: 'vi1', x: 0.40, y: 0.55 }, { id: 'vi2', x: 0.45, y: 0.50 }, { id: 'vi3', x: 0.50, y: 0.55 }, { id: 'vi4', x: 0.48, y: 0.65 }, { id: 'vi5', x: 0.42, y: 0.68 },
            // Libra
            { id: 'li1', x: 0.70, y: 0.50 }, { id: 'li2', x: 0.75, y: 0.45 }, { id: 'li3', x: 0.78, y: 0.55 }, { id: 'li4', x: 0.72, y: 0.62 },
            // Escorpião
            { id: 'sc1', x: 0.90, y: 0.55 }, { id: 'sc2', x: 0.88, y: 0.65 }, { id: 'sc3', x: 0.92, y: 0.72 }, { id: 'sc4', x: 0.85, y: 0.75 },
            // Sagitário
            { id: 'sa1', x: 0.15, y: 0.85 }, { id: 'sa2', x: 0.20, y: 0.80 }, { id: 'sa3', x: 0.25, y: 0.82 }, { id: 'sa4', x: 0.22, y: 0.88 },
            // Capricórnio
            { id: 'cp1', x: 0.45, y: 0.85 }, { id: 'cp2', x: 0.55, y: 0.82 }, { id: 'cp3', x: 0.50, y: 0.92 },
            // Aquário
            { id: 'aq1', x: 0.72, y: 0.85 }, { id: 'aq2', x: 0.78, y: 0.80 }, { id: 'aq3', x: 0.82, y: 0.88 }, { id: 'aq4', x: 0.68, y: 0.92 },
            // Peixes
            { id: 'pi1', x: 0.92, y: 0.10 }, { id: 'pi2', x: 0.95, y: 0.25 }, { id: 'pi3', x: 0.88, y: 0.20 }
        ];

        const constellations = [
            { name: 'Áries', date: '21 Mar - 19 Abr', links: [['ar1','ar2'],['ar2','ar3']] },
            { name: 'Touro', date: '20 Abr - 20 Mai', links: [['ta1','ta2'],['ta2','ta3'],['ta1','ta4']] },
            { name: 'Gêmeos', date: '21 Mai - 20 Jun', links: [['ge1','ge2'],['ge1','ge3'],['ge2','ge4']] },
            { name: 'Câncer', date: '21 Jun - 22 Jul', links: [['ca1','ca2'],['ca2','ca3'],['ca2','ca4']] },
            { name: 'Leão', date: '23 Jul - 22 Ago', links: [['le1','le2'],['le2','le3'],['le3','le4'],['le4','le5'],['le5','le1']] },
            { name: 'Virgem', date: '23 Ago - 22 Set', links: [['vi1','vi2'],['vi2','vi3'],['vi3','vi4'],['vi4','vi5'],['vi5','vi1']] },
            { name: 'Libra', date: '23 Set - 22 Out', links: [['li1','li2'],['li2','li3'],['li4','li1']] },
            { name: 'Escorpião', date: '23 Out - 21 Nov', links: [['sc1','sc2'],['sc2','sc3'],['sc3','sc4']] },
            { name: 'Sagitário', date: '22 Nov - 21 Dez', links: [['sa1','sa2'],['sa2','sa3'],['sa3','sa4'],['sa4','sa1']] },
            { name: 'Capricórnio', date: '22 Dez - 19 Jan', links: [['cp1','cp2'],['cp2','cp3'],['cp3','cp1']] },
            { name: 'Aquário', date: '20 Jan - 18 Fev', links: [['aq1','aq2'],['aq2','aq3'],['aq3','aq4']] },
            { name: 'Peixes', date: '19 Fev - 20 Mar', links: [['pi1','pi2'],['pi2','pi3']] }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // Inicializa estrelas com posições físicas, velocidades de drift e cintilação
            stars = starsData.map(s => ({
                ...s, 
                px: s.x * width, py: s.y * height, // Posição em pixels
                vx: (Math.random() - 0.5) * 0.15, // Velocidade de drift X (muito lenta)
                vy: (Math.random() - 0.5) * 0.15, // Velocidade de drift Y
                o: Math.random(), spd: 0.005 + Math.random() * 0.01 // Cintilação
            }));
        }

        function draw() {
            // Fundo preto puro, com um rastro de luz muito leve para suavizar o movimento
            ctx.fillStyle = 'rgba(1, 1, 3, 0.2)'; 
            ctx.fillRect(0, 0, width, height);
            
            let activeSign = null;

            // 1. Desenhar Constelações e Lógica de Interação
            constellations.forEach(c => {
                let hover = false;
                // Verifica se o mouse está perto de qualquer estrela da constelação
                c.links.forEach(l => {
                    const s1 = stars.find(st => st.id === l[0]), s2 = stars.find(st => st.id === l[1]);
                    if (mouse.x && (Math.hypot(s1.px-mouse.x, s1.py-mouse.y) < mouse.r || Math.hypot(s2.px-mouse.x, s2.py-mouse.y) < mouse.r)) hover = true;
                });

                ctx.beginPath();
                // Estilo da linha (brilha se houver hover)
                ctx.strokeStyle = hover ? 'rgba(255, 251, 223, 0.8)' : 'rgba(255, 255, 255, 0.04)';
                ctx.lineWidth = hover ? 2.5 : 0.8;
                
                if(hover) { 
                    ctx.shadowBlur = 20; ctx.shadowColor = '#fffbdf'; 
                    activeSign = c; 
                }
                
                // Desenha as linhas entre os pontos
                c.links.forEach(l => {
                    const s1 = stars.find(st => st.id === l[0]), s2 = stars.find(st => st.id === l[1]);
                    ctx.moveTo(s1.px, s1.py); ctx.lineTo(s2.px, s2.py);
                });
                ctx.stroke(); ctx.shadowBlur = 0; // Reseta o shadow
            });

            // 2. Atualizar Posição e Desenhar Estrelas
            stars.forEach(s => {
                // Efeito de Drifting (as constelações flutuam sozinhas)
                s.px += s.vx;
                s.py += s.vy;

                // Efeito de Rebote (Screen Bouncing)
                if (s.px < 50 || s.px > width - 50) s.vx *= -1;
                if (s.py < 50 || s.py > height - 100) s.vy *= -1;

                // Interação Plexus (O mouse distorce suavemente a rede neural)
                if (mouse.x !== null) {
                    let dx = s.px - mouse.x;
                    let dy = s.py - mouse.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < mouse.r) {
                        let force = (mouse.r - dist) / mouse.r;
                        let angle = Math.atan2(dy, dx);
                        // Atração suave
                        s.px -= Math.cos(angle) * force * 1.5;
                        s.py -= Math.sin(angle) * force * 1.5;
                    }
                }

                // Cintilação
                s.o += s.spd; if(s.o > 1 || s.o < 0.2) s.spd *= -1;
                
                // Desenha o ponto
                ctx.beginPath(); 
                ctx.arc(s.px, s.py, 2.2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 251, 223, ${s.o})`; // Dourado pálido
                ctx.fill();
            });

            // 3. Atualizar a UI
            if(activeSign) {
                signTitle.innerText = activeSign.name; signDate.innerText = activeSign.date;
                ui.classList.add('active');
            } else { ui.classList.remove('active'); }

            requestAnimationFrame(draw);
        }

        // Eventos
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        // Limpa o mouse quando sai da tela
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        // Início
        resize(); draw();
    </script>
</body>
</html>
