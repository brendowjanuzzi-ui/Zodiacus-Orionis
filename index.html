<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte Generativa - Rede Neural Interativa</title>
    <style>
        /* CSS: Estilo e Cores */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a12;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            user-select: none;
        }

        #ui-panel h1 {
            font-size: 18px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4df3ff;
        }

        .control-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        button#btn-random {
            background-color: #4df3ff;
            color: #0a0a12;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        button#btn-random:hover {
            background-color: white;
        }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>

    <div id="ui-panel">
        <h1>Rede Neural</h1>
        <div class="control-group">
            <label>Pontos: <span id="count-val"></span></label>
            <input type="range" id="particle-count" min="50" max="350" step="10" value="150">
        </div>
        <div class="control-group">
            <label>Conexão</label>
            <input type="range" id="connection-dist" min="50" max="250" step="10" value="150">
        </div>
        <button id="btn-random">Cores Aleatórias</button>
    </div>

    <script>
        /* JAVASCRIPT: A Lógica do Sistema */
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        const uiPanel = document.getElementById('ui-panel');
        const particleCountInput = document.getElementById('particle-count');
        const connectionDistInput = document.getElementById('connection-dist');
        const countValSpan = document.getElementById('count-val');
        const btnRandom = document.getElementById('btn-random');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };
        let particleCount = parseInt(particleCountInput.value);
        let connectionDist = parseInt(connectionDistInput.value);
        let colors = [{ r: 77, g: 243, b: 255 }, { r: 255, g: 0, b: 255 }, { r: 255, g: 255, b: 255 }];

        countValSpan.innerText = particleCount;

        // --- FUNÇÃO DE REDIMENSIONAMENTO (A que você pediu) ---
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles(); // Reinicia os pontos para cobrirem a nova área
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.5) * 1.2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random() * 0.5 + 0.2;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.fill();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                if (mouse.x !== null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < mouse.radius) {
                        let force = (mouse.radius - dist) / mouse.radius;
                        this.x += Math.cos(Math.atan2(dy, dx)) * force * 3;
                        this.y += Math.sin(Math.atan2(dy, dx)) * force * 3;
                    }
                }
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < connectionDist) {
                        let alpha = 1 - (dist / connectionDist);
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        let c = particles[i].color;
                        ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha * 0.2})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 18, 0.2)';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            drawLines();
            requestAnimationFrame(animate);
        }

        // Listeners
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        particleCountInput.addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            countValSpan.innerText = particleCount;
            initParticles();
        });

        connectionDistInput.addEventListener('input', (e) => {
            connectionDist = parseInt(e.target.value);
        });

        btnRandom.addEventListener('click', () => {
            const getNeon = () => ({ r: Math.floor(Math.random() * 155) + 100, g: Math.floor(Math.random() * 155) + 100, b: Math.floor(Math.random() * 155) + 100 });
            colors = [getNeon(), getNeon(), {r:255,g:255,b:255}];
            initParticles();
        });

        resizeCanvas();
        animate();
    </script>
</body>
</html>
